# Cargo config for the Yantra bootloader (multiboot1, 32-bit).
#
# Custom JSON target spec for i686-bare-metal (no built-in
# i686-unknown-none target exists). Modern Rust requires
# `-Zjson-target-spec` to accept JSON specs; we set it via
# unstable.
#
# build-std rebuilds core + compiler_builtins for the target.
# panic_immediate_abort keeps the binary tiny (no panic
# infrastructure beyond our handler).

[build]
target = "i686-yantra.json"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.'cfg(target_arch = "x86")']
# Pass -T to rustc so the linker uses our linker.ld.
rustflags = ["-Clink-arg=-Tlinker.ld", "-Clink-arg=--nmagic"]

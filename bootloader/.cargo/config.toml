# Cargo config for the Yantra bootloader.
#
# Targets the built-in `x86_64-unknown-none` (Rust tier-2 since 1.62)
# instead of a custom JSON spec — modern Rust requires
# `-Zjson-target-spec` for JSON specs which adds a friction step.
# `x86_64-unknown-none` already gives us bare-metal x86_64 with no
# OS, no redzone, soft-float — exactly what the bootloader needs.
#
# `build-std` rebuilds core + compiler_builtins against this target
# since standard sysroot binaries assume an OS.

[build]
target = "x86_64-unknown-none"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

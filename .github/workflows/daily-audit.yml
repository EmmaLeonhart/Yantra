name: Daily substrate-honesty audit prepend

# Prepends a dated audit-task to queue.md once a day so the next
# autonomous-loop session's first action is reviewing the previous
# day's commits for substrate-honesty drift — fake-substrate framing,
# host-state-shuttle patterns dressed as RNNs, runtime_dim bloat,
# claims that something is "substrate-pure" / "verified" / "works"
# without measurement.
#
# Why this exists: the 2026-05-27 font-demo session uncovered that
# Yantra had been calling host-Python state-shuttle "an RNN" across
# multiple apps and paying 96× runtime_dim bloat on every substrate
# op because nothing was forcing a regular audit. The fix lived in
# the cron-driven productivity loop but a single missed audit pass
# meant the bug compounded. A GH-Action heartbeat makes the audit a
# durable repo property rather than a session-only practice.
#
# The action is read-only on the codebase: it prepends one line to
# queue.md and pushes. The actual audit work is done by the next
# autonomous-loop session that picks the item off queue.md.
#
# Companion workflow on Sutra: same shape, same purpose. The two
# stay in sync because the same dim-bloat / fake-recurrence pattern
# can land in either repo (Yantra apps OR Sutra examples).

on:
  schedule:
    # 04:23 UTC daily. Odd minute, well-spaced from sutra-submodule-bump
    # at 06:17 so the two jobs never queue together on the runner.
    - cron: '23 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-audit-prepend
  cancel-in-progress: false

jobs:
  prepend-audit-task:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Yantra
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Prepend dated audit task to queue.md
        id: prepend
        run: |
          set -euo pipefail
          today="$(date -u +%Y-%m-%d)"
          marker="### 🔍 Daily substrate-honesty audit — ${today}"

          # Idempotent: if today's marker is already in queue.md, skip.
          if grep -qF "$marker" queue.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Today's audit task already present — skipping prepend."
            exit 0
          fi

          # Find the line that starts the first ### section after "## Active"
          # so we prepend at the TOP of Active rather than the file head.
          insert_after="$(grep -n '^## Active' queue.md | head -1 | cut -d: -f1)"
          if [ -z "${insert_after:-}" ]; then
            echo "queue.md missing ## Active section — bailing" >&2
            exit 1
          fi

          tmp="$(mktemp)"
          {
            head -n "$insert_after" queue.md
            cat <<EOF

${marker}

Auto-prepended by .github/workflows/daily-audit.yml. The next autonomous-loop session
should, as its first action: (a) review every commit landed since the previous daily
audit; (b) for each commit that touched a .su or its compile/admit path, verify
runtime_dim matches what the .su actually needs (basis_vector usage → embedding dim;
no basis_vector → tiny dim, typically 8-16); (c) for any commit that frames work as
"recurrent" / "RNN" / "substrate-pure" / "verified", verify the claim against
measurement, not against earlier session framing; (d) if anything is amiss, write a
finding under planning/ and a fix item under queue.md, BEFORE doing other queue work.
Then delete this item.
EOF
            tail -n +"$((insert_after + 1))" queue.md
          } > "$tmp"
          mv "$tmp" queue.md
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Prepended audit task for ${today}."

      - name: Commit + push the prepend
        if: steps.prepend.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add queue.md
          if git diff --cached --quiet; then
            echo "No queue.md change staged — skipping commit."
            exit 0
          fi
          today="$(date -u +%Y-%m-%d)"
          git commit -m "queue.md: prepend daily substrate-honesty audit task for ${today}

          Automated by .github/workflows/daily-audit.yml. The next autonomous-loop
          session reviews recent commits for substrate-honesty drift before doing
          other queue work — runtime_dim bloat, fake-recurrence framing, unverified
          'substrate-pure' / 'works' / 'verified' claims. See queue.md item for the
          specific checklist."
          git push origin HEAD:main

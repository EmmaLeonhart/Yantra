name: CI

# Five jobs — every build artifact is gated on every push:
#   - test:               Python 3.13 + CPU torch + Sutra submodule, pytest on
#                         the kernel + apps suite. The fast lane; mirrors what
#                         most contributors do locally.
#   - docker:             builds the Dockerfile dev container and runs the same
#                         pytest inside it. Catches Dockerfile drift early.
#   - rust-orchestrator:  cargo build + cargo test for orchestrator/ (the
#                         YAXN/YAXE/YPRC/YKST checkpoint codecs + the json
#                         reader + the dump-checkpoint binary). No third-party
#                         deps, no system libs.
#   - gui-rust:           cargo build + headless --check bridge for the
#                         apps/gui-rust counter binary (Rust window over a
#                         subprocess bridge to a Python+Sutra substrate child).
#                         Needs minifb's Linux libs + Python+torch; pre-warms
#                         the Sutra codebook cache from the committed fixture.
#   - bootloader:         cargo build for the multiboot1 i686 bare-metal
#                         bootloader. Uses the pinned nightly + rust-src +
#                         build-std + the custom i686-yantra.json target spec
#                         (all in bootloader/.cargo/config.toml + rust-
#                         toolchain.toml). Catches build-std / target-spec
#                         drift on the toolchain.

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # numpy is needed by the Sutra runtime even in CPU-only mode
          # (compiled .su programs convert tensors via numpy in some
          # paths). torch on its own doesn't pull numpy as a hard dep,
          # so install it explicitly.
          pip install pytest numpy
          # CPU-only torch wheel — the Sutra compiler (used by the
          # SutraService kernel tests) needs torch, but we don't need
          # CUDA for CI smoke tests. The CPU wheel is ~200MB; the
          # full CUDA wheel would be >2GB, which isn't worth the CI
          # minutes for a runtime smoke test.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Init submodules (Sutra compiler is needed for SutraService tests)
        run: git submodule update --init external/Sutra
      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests/ directory yet — skipping"
          fi

  docker:
    name: Build dev container + run tests inside it
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Init Sutra submodule (so SutraService tests find it inside the container)
        run: git submodule update --init external/Sutra
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build dev container image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: yantra-dev:ci
          # Cache the layers between CI runs so the slow torch wheel
          # download doesn't happen every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run pytest inside the dev container
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            yantra-dev:ci \
            pytest tests/ -v

  rust-orchestrator:
    name: Rust orchestrator — cargo build + cargo test + dump-checkpoint smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The orchestrator/ crate is the incremental Rust port of the CPU-side
    # Connectome Manager (the YAXN/YAXE/YPRC/YKST checkpoint codec stack, the
    # flat-JSON reader, and the dump-checkpoint binary). It has no third-party
    # dependencies; the lib is no_std-ready, the bin uses std. Gate every push
    # so future changes can't silently regress the byte-for-byte cross-checks
    # against the committed Python fixtures.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build (no_std lib + std bin)
        working-directory: orchestrator
        run: cargo build --bins --lib
      - name: cargo test (lib + bin targets)
        working-directory: orchestrator
        run: cargo test
      - name: dump-checkpoint smoke (compose the units on the committed YKST fixture)
        working-directory: orchestrator
        run: cargo run --quiet --bin dump-checkpoint -- tests/fixtures/kernel_state.ykst > /dev/null

  gui-rust:
    name: gui-rust — cargo build + bridge --check (subprocess to Sutra)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # apps/gui-rust is the Rust orchestrator front-end for the counter GUI: a
    # minifb window in Rust, with the count + pixel field computed on the Sutra
    # substrate in a Python child over a subprocess bridge. CI can't open a
    # window, so it runs the binary's --check mode, which exercises the FULL
    # bridge end-to-end (spawn substrate, request init + 3 clicks, verify the
    # substrate count + frame dims) without needing a screen.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: System libs for minifb (X11 + Wayland + xkbcommon — build-only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev
      - name: Init Sutra submodule (substrate server compiles .su)
        run: git submodule update --init external/Sutra
      - name: Python deps for the substrate server
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Pre-warm Sutra codebook cache (avoid ollama in the Python child)
        run: |
          mkdir -p "$HOME/.cache/sutra/embeddings"
          cp tests/fixtures/nomic-embed-text-d868.pt "$HOME/.cache/sutra/embeddings/"
      - name: cargo build (gui-rust binary)
        working-directory: apps/gui-rust
        run: cargo build --bin yantra-gui-counter
      - name: bridge --check (Rust spawns substrate, counts on the substrate, no window)
        working-directory: apps/gui-rust
        run: cargo run --quiet --bin yantra-gui-counter -- --check

  bootloader:
    name: bootloader — cargo build (multiboot1 i686 bare-metal)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The bootloader/ crate is real Rust, freestanding, multiboot1, 32-bit
    # i686 bare-metal. It uses the pinned nightly (bootloader/rust-toolchain.toml
    # → nightly-2026-04-01 with rust-src + llvm-tools-preview), build-std for
    # core + compiler_builtins, and a custom JSON target spec (i686-yantra.json,
    # configured in bootloader/.cargo/config.toml). All gated here so toolchain
    # drift or a build-std / json-target-spec regression fails before merge.
    # No qemu run — just the build; running the multiboot ELF is a manual step
    # via scripts/qemu-run.{sh,bat}.
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly + rust-src + llvm-tools-preview
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-01
          components: rust-src, llvm-tools-preview
      - name: cargo build (pulls i686-yantra.json target + build-std from .cargo/config.toml)
        working-directory: bootloader
        run: cargo build

name: CI

# Three jobs:
#   - test:               the fast lane. Sets up Python 3.13 + CPU torch + the
#                         Sutra submodule and runs pytest. Mirrors what most
#                         contributors do locally.
#   - docker:             builds the dev container Dockerfile and runs the same
#                         pytest inside it. Catches Dockerfile drift early —
#                         without this job, the Dockerfile rots silently.
#   - rust-orchestrator:  cargo build + cargo test for the orchestrator/ crate
#                         (the YAXN/YAXE/YPRC/YKST checkpoint codecs + the json
#                         reader + the dump-checkpoint binary). Has no third-
#                         party deps, so no system-lib install or --locked
#                         complexity. apps/gui-rust (minifb needs X11 libs) and
#                         bootloader/ (nightly + build-std + custom target) are
#                         deferred to separate CI.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # numpy is needed by the Sutra runtime even in CPU-only mode
          # (compiled .su programs convert tensors via numpy in some
          # paths). torch on its own doesn't pull numpy as a hard dep,
          # so install it explicitly.
          pip install pytest numpy
          # CPU-only torch wheel — the Sutra compiler (used by the
          # SutraService kernel tests) needs torch, but we don't need
          # CUDA for CI smoke tests. The CPU wheel is ~200MB; the
          # full CUDA wheel would be >2GB, which isn't worth the CI
          # minutes for a runtime smoke test.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Init submodules (Sutra compiler is needed for SutraService tests)
        run: git submodule update --init external/Sutra
      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests/ directory yet — skipping"
          fi

  docker:
    name: Build dev container + run tests inside it
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Init Sutra submodule (so SutraService tests find it inside the container)
        run: git submodule update --init external/Sutra
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build dev container image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: yantra-dev:ci
          # Cache the layers between CI runs so the slow torch wheel
          # download doesn't happen every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run pytest inside the dev container
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            yantra-dev:ci \
            pytest tests/ -v

  rust-orchestrator:
    name: Rust orchestrator — cargo build + cargo test + dump-checkpoint smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The orchestrator/ crate is the incremental Rust port of the CPU-side
    # Connectome Manager (the YAXN/YAXE/YPRC/YKST checkpoint codec stack, the
    # flat-JSON reader, and the dump-checkpoint binary). It has no third-party
    # dependencies; the lib is no_std-ready, the bin uses std. Gate every push
    # so future changes can't silently regress the byte-for-byte cross-checks
    # against the committed Python fixtures.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build (no_std lib + std bin)
        working-directory: orchestrator
        run: cargo build --bins --lib
      - name: cargo test (lib + bin targets)
        working-directory: orchestrator
        run: cargo test
      - name: dump-checkpoint smoke (compose the units on the committed YKST fixture)
        working-directory: orchestrator
        run: cargo run --quiet --bin dump-checkpoint -- tests/fixtures/kernel_state.ykst > /dev/null

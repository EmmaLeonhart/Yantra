name: CI

# Minimal test lane. Picks up any pytest tests under tests/ and runs
# them. Kept lightweight on purpose — the paper-submit scripts are the
# only Python in this repo today, and they have no heavy dependencies.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests/ directory yet — skipping"
          fi

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Redirecting to noldor.tech…</title>
<link rel="canonical" href="https://noldor.tech/">
<meta http-equiv="refresh" content="0; url=https://noldor.tech/">
<script>
// GitHub Pages serves this for any unknown path, so every yantraos.org/<path>
// redirects to noldor.tech/<path> preserving the path, query, and hash.
(function () {
  var base = "https://noldor.tech";
  var dest = base + window.location.pathname + window.location.search + window.location.hash;
  window.location.replace(dest);
})();
</script>
</head>
<body>
<p>This project is now <strong>Noldor Technologies</strong>. Redirecting to
<a id="go" href="https://noldor.tech/">noldor.tech</a>…</p>
<script>
document.getElementById("go").href =
  "https://noldor.tech" + window.location.pathname + window.location.search + window.location.hash;
</script>
</body>
</html>
